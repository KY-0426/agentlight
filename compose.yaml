services:
  mysql:
    image: mysql:5.7
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: agent_light
      MYSQL_USER: agent_light
      MYSQL_PASSWORD: agent_light
    ports:
      - "3306:3306"
    volumes:
      - agent_light_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uagent_light", "-pagent_light"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8787
      DATABASE_URL: mysql://agent_light:agent_light@mysql:3306/agent_light
    ports:
      - "8787:8787"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

volumes:
  agent_light_mysql_data:
